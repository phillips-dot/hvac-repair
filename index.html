<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080d18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="냉동공조수리">
<meta name="mobile-web-app-capable" content="yes">
<title>냉동공조 수리 기록</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E❄️%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23080d18'/%3E%3Ctext y='.9em' x='.05em' font-size='85'%3E❄️%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  color-scheme: dark;
  --bg: #080d18; --card: #0f1825; --border: #1a2a3a;
  --accent: #00d4ff; --accent2: #0ea5e9; --success: #10b981;
  --warning: #f59e0b; --danger: #ef4444;
  --text: #dde6f0; --muted: #4a6178; --subtle: #1e3248;
}
html, body { margin: 0; padding: 0; overscroll-behavior: none; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
  padding-top: env(safe-area-inset-top);
  min-height: 100vh;
}
.header {
  background: linear-gradient(160deg, #050a14, #0a1a2e);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
}
.header h1 { font-size: 20px; font-weight: 800; color: var(--accent); margin: 0; }
.header p { font-size: 12px; color: var(--muted); margin: 2px 0 0; letter-spacing: 1px; }
.tabs {
  display: flex; background: var(--card); border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 11px 2px; font-size: 13px; color: var(--muted);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; font-family: inherit;
}
.tab.active { color: var(--accent); font-weight: 800; border-bottom-color: var(--accent); }
.sec { padding: 14px; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
}
.card.warn { border-color: rgba(245, 158, 11, 0.3); }
.lbl {
  font-size: 12px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px; display: block; font-weight: 700;
}
input, textarea, select {
  width: 100%; background: var(--subtle); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 11px; color: var(--text);
  font-size: 15px; outline: none; font-family: inherit;
}
input[type="date"] {
  -webkit-appearance: none;
  appearance: none;
}
textarea { min-height: 72px; resize: vertical; }
.row { display: flex; gap: 8px; }
.row > * { flex: 1; min-width: 0; }
.mb8 { margin-bottom: 8px; }
.mb10 { margin-bottom: 10px; }
.btn {
  width: 100%; background: var(--accent); color: #000;
  border: none; border-radius: 9px; padding: 12px;
  font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
}
.btn.success { background: var(--success); }
.btn.danger { background: var(--danger); color: #fff; }
.btn-sm {
  background: transparent; color: var(--accent); border: 1px solid rgba(0,212,255,0.3);
  border-radius: 6px; padding: 5px 11px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.btn-sm.danger { color: var(--danger); border-color: rgba(239,68,68,0.3); }
.chip {
  display: inline-block; background: var(--subtle); color: var(--muted);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 10px; font-size: 12px; cursor: pointer;
  margin: 0 4px 6px 0;
}
.chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.tag {
  display: inline-flex; align-items: center; border-radius: 20px;
  padding: 2px 9px; font-size: 10px; font-weight: 700;
}
.tag.accent { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
.tag.warn { background: rgba(245,158,11,0.12); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
.tag.accent2 { background: rgba(14,165,233,0.12); color: var(--accent2); border: 1px solid rgba(14,165,233,0.25); }
.log-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px; margin-bottom: 9px; cursor: pointer;
}
.sb { display: flex; justify-content: space-between; align-items: center; }
.ai-box {
  background: #05140a; border: 1px solid rgba(16,185,129,0.3);
  border-radius: 12px; padding: 14px; margin-top: 10px;
}
.ai-text {
  font-size: 13px; line-height: 1.85; color: #86efac; white-space: pre-wrap;
}
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; text-align: center;
}
.stat-n { font-size: 26px; font-weight: 800; color: var(--accent); }
.stat-l { font-size: 10px; color: var(--muted); margin-top: 3px; }
.bar-bg { height: 5px; background: var(--subtle); border-radius: 3px; margin: 4px 0 10px; }
.bar-fg { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s; }
.bar-fg.warn { background: var(--warning); }
.filter-row { display: flex; overflow-x: auto; padding-bottom: 6px; margin-bottom: 10px; }
.filter-row::-webkit-scrollbar { display: none; }
.chip.nowrap { white-space: nowrap; }
.photo-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-bottom: 10px;
}
.photo-item {
  position: relative; aspect-ratio: 1; border-radius: 8px;
  overflow: hidden; background: var(--subtle); border: 1px solid var(--border);
}
.photo-item img {
  width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer;
}
.photo-item .del-x {
  position: absolute; top: 4px; right: 4px;
  background: rgba(239,68,68,0.9); color: #fff;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; cursor: pointer; border: none;
}
.photo-add {
  aspect-ratio: 1; border-radius: 8px; background: var(--subtle);
  border: 2px dashed var(--border); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  color: var(--muted); font-size: 11px; gap: 4px;
}
.photo-add:hover { border-color: var(--accent); color: var(--accent); }
.photo-add .icon { font-size: 22px; }
.photo-viewer {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; cursor: pointer;
}
.photo-viewer img { max-width: 100%; max-height: 100%; }
.photo-count { font-size: 10px; color: var(--muted); margin-bottom: 6px; }

/* AI 도우미 채팅 UI */
.chat-container {
  display: flex; flex-direction: column;
  min-height: calc(100vh - 180px);
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.msg {
  max-width: 85%; padding: 10px 13px; border-radius: 14px;
  font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
}
.msg.user {
  align-self: flex-end; background: var(--accent);
  color: #000; border-bottom-right-radius: 4px;
}
.msg.ai {
  align-self: flex-start; background: var(--card);
  color: var(--text); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.system {
  align-self: center; background: rgba(245,158,11,0.1);
  color: var(--warning); font-size: 11px;
  border: 1px solid rgba(245,158,11,0.3);
  padding: 6px 12px; border-radius: 20px;
}
.msg-time {
  font-size: 9px; color: var(--muted); margin-top: 4px;
  text-align: right;
}
.msg.ai .msg-time { text-align: left; }
.msg-photo {
  max-width: 200px; border-radius: 8px; margin-top: 6px;
  display: block; cursor: pointer;
}
.msg-cases {
  background: rgba(0,212,255,0.08); border-left: 3px solid var(--accent);
  padding: 8px 12px; margin: 6px 0; border-radius: 6px;
  font-size: 12px;
}
.msg-cases strong { color: var(--accent); }
.chat-input-area {
  background: var(--card); border-top: 1px solid var(--border);
  padding: 10px; position: sticky; bottom: 0;
}
.chat-input-row {
  display: flex; gap: 6px; align-items: flex-end;
}
.chat-input {
  flex: 1; background: var(--subtle); border: 1px solid var(--border);
  border-radius: 20px; padding: 9px 14px; color: var(--text);
  font-size: 13px; outline: none; font-family: inherit;
  min-height: 20px; max-height: 120px; resize: none;
}
.chat-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.chat-btn.send { background: var(--accent); color: #000; }
.chat-btn.photo { background: var(--subtle); color: var(--accent); }
.chat-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.chat-typing {
  align-self: flex-start; padding: 12px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; font-size: 12px; color: var(--muted);
}
.chat-typing .dot {
  display: inline-block; width: 5px; height: 5px;
  background: var(--accent); border-radius: 50%;
  margin: 0 2px; animation: blink 1.4s infinite;
}
.chat-typing .dot:nth-child(2) { animation-delay: 0.2s; }
.chat-typing .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
.chat-welcome {
  text-align: center; padding: 30px 20px; color: var(--muted);
}
.chat-welcome h3 { color: var(--accent); font-size: 16px; margin: 0 0 10px; }
.chat-welcome .quick-btns {
  display: flex; flex-direction: column; gap: 6px; margin-top: 20px;
}
.quick-q-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: 10px;
  font-size: 12px; cursor: pointer; text-align: left;
  font-family: inherit;
}
.quick-q-btn:hover { border-color: var(--accent); }
.chat-toolbar {
  display: flex; gap: 6px; padding: 8px 10px 0;
  overflow-x: auto; background: var(--card);
  border-bottom: 1px solid var(--border);
}
.chat-toolbar::-webkit-scrollbar { display: none; }
.chat-mode-chip {
  white-space: nowrap; padding: 5px 12px; border-radius: 20px;
  font-size: 11px; border: 1px solid var(--border);
  background: var(--subtle); color: var(--muted);
  cursor: pointer; font-weight: 600;
}
.chat-mode-chip.active { background: var(--accent); color: #000; border-color: var(--accent); }
.save-record-card {
  background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3);
  border-radius: 10px; padding: 12px; margin: 8px 0;
}
.save-record-card h4 {
  margin: 0 0 8px; color: var(--success); font-size: 12px;
  display: flex; align-items: center; gap: 6px;
}
.save-record-card .field {
  font-size: 12px; margin: 4px 0; line-height: 1.5;
}
.save-record-card .field strong { color: var(--accent); margin-right: 6px; }
.save-record-actions {
  display: flex; gap: 6px; margin-top: 10px;
}
.save-record-actions button {
  flex: 1; padding: 8px; border-radius: 6px; font-size: 12px;
  font-weight: 700; cursor: pointer; font-family: inherit;
}
.btn-confirm { background: var(--success); color: #fff; border: none; }
.btn-edit { background: var(--subtle); color: var(--accent); border: 1px solid var(--accent); }
.photo-preview-row {
  display: flex; gap: 6px; padding: 8px 10px 0;
  overflow-x: auto;
}
.photo-preview-row::-webkit-scrollbar { display: none; }
.photo-preview {
  position: relative; width: 50px; height: 50px;
  border-radius: 6px; overflow: hidden; flex-shrink: 0;
  border: 1px solid var(--border);
}
.photo-preview img { width: 100%; height: 100%; object-fit: cover; }
.photo-preview .remove {
  position: absolute; top: 2px; right: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: rgba(239,68,68,0.9); color: #fff;
  font-size: 10px; display: flex; align-items: center;
  justify-content: center; border: none; cursor: pointer;
}
.install-banner {
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(14,165,233,0.15));
  border: 1px solid rgba(0,212,255,0.3); border-radius: 12px;
  padding: 12px 14px; margin: 14px; font-size: 12px; display: none;
  position: relative;
}
.install-banner strong { color: var(--accent); }
.install-banner .close-x {
  position: absolute; top: 8px; right: 12px; cursor: pointer;
  color: var(--muted); font-size: 18px;
}
.back-btn { margin-bottom: 14px; }
hr { border: none; border-top: 1px solid var(--border); margin: 7px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>❄️ 냉동공조 수리 기록</h1>
  <p>HVAC REPAIR LOG · AI DATA ANALYSIS</p>
</div>

<div class="tabs">
  <button class="tab active" data-tab="0">📝 기록</button>
  <button class="tab" data-tab="1">📋 목록</button>
  <button class="tab" data-tab="2">💬 AI도우미</button>
  <button class="tab" data-tab="3">🤖 AI분석</button>
  <button class="tab" data-tab="4">📊 통계</button>
</div>

<div id="install-banner" class="install-banner">
  <span class="close-x" onclick="document.getElementById('install-banner').style.display='none'">×</span>
  <strong>📱 홈화면에 설치</strong><br>
  <span id="install-text"></span>
</div>

<div id="app"></div>

<script>
const STORAGE_KEY = 'hvac-repair-logs-v2';
const API_KEY_STORAGE = 'anthropic-api-key';
const CHAT_STORAGE = 'hvac-chat-history';

const DEVICE_TYPES = ["에어컨(가정용)", "에어컨(상업용)", "냉동창고", "기타 냉동공조"];
const FAULT_TYPES = ["냉매 부족/누설", "압축기 불량", "팬모터 불량", "전기계통 불량", "열교환기 오염", "팽창밸브 불량", "센서 불량", "드레인 막힘", "기타"];
const REFRIGERANTS = ["R-22", "R-410A", "R-32", "R-404A", "R-134a", "R-407C", "R-507", "R-438", "기타"];
const COMMON_PARTS = ["압축기", "쿨러 팬모터", "실외기 팬모터", "팽창변", "오리피스", "드라이필터", "DPS", "OPS", "바닥히터", "1자 히터", "드레인히터", "컨트롤박스", "차단기", "마그네트", "콤프릴레이", "팬모터릴레이", "OCR", "전자변"];

// ── IndexedDB ─────────────────────────────────────────────
const DB_NAME = 'hvac-repair-db';
const DB_VERSION = 1;
const DB_STORE = 'data';
let _db = null;
let _logsCache = [];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const req = _db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror = () => reject(req.error);
  });
}

function dbSet(key, value) {
  return new Promise((resolve, reject) => {
    const req = _db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function initApp() {
  await openDB();
  let logs = await dbGet('logs');
  if (!logs) {
    // localStorage에서 마이그레이션
    try {
      const old = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      logs = old;
      if (old.length > 0) {
        await dbSet('logs', logs);
        localStorage.removeItem(STORAGE_KEY);
      }
    } catch { logs = []; }
  }
  _logsCache = logs || [];
  render();
  showInstallGuide();
}

// ── 유틸 ─────────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const getLogs = () => _logsCache;
function saveLogs(logs) {
  _logsCache = logs;
  dbSet('logs', logs).catch(e => alert('저장 중 오류: ' + e.message));
}
const getApiKey = () => localStorage.getItem(API_KEY_STORAGE) || '';
const setApiKey = (k) => localStorage.setItem(API_KEY_STORAGE, k);
const fmt = (iso) => {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
};
const esc = (str) => String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let currentTab = 0;
let selectedLog = null;
let formState = null;
let editingLogId = null;
let filter = '';

// ── 탭 전환 ───────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const newTab = parseInt(btn.dataset.tab);
    if (newTab !== 0 && editingLogId !== null) {
      if (!confirm('수정 중인 내용이 있습니다. 취소하고 이동할까요?')) return;
      formState = null;
      editingLogId = null;
    }
    currentTab = newTab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLog = null;
    render();
  });
});

// ── 기록 폼 ─────────────────────────────────────────────
function LogForm() {
  if (!formState) {
    if (editingLogId !== null) {
      const log = getLogs().find(l => l.id === editingLogId);
      if (log) {
        formState = { ...log };
      } else {
        editingLogId = null;
      }
    }
    if (!formState) {
      formState = {
        date: new Date().toISOString().slice(0,10),
        deviceType: '', model: '', location: '',
        coolerHP: '', outdoorHP: '', compHP: '',
        fanMotorType: '', fanMotorWatt: '', fanBladeSize: '',
        faultType: '', symptom: '', cause: '', action: '',
        parts: [], partsCustom: '', partPhotos: [],
        refrigerant: '', refAmount: '',
        highPressure: '', lowPressure: '',
        workTime: '', cost: '',
        specialNote: '', memo: '',
        photos: []
      };
    }
  }
  const f = formState;

  return `
    <div class="sec">
      <div class="card">
        <span class="lbl">📅 수리 날짜</span>
        <input type="date" value="${esc(f.date)}" onchange="setField('date', this.value)">
      </div>

      <div class="card">
        <span class="lbl">🔧 장비 정보</span>
        <select class="mb8" onchange="setField('deviceType', this.value); render()">
          <option value="">장비 종류 선택 *</option>
          ${DEVICE_TYPES.map(d => `<option ${f.deviceType === d ? 'selected' : ''}>${d}</option>`).join('')}
        </select>
        ${['에어컨(가정용)', '에어컨(상업용)'].includes(f.deviceType) ? `
          <input class="mb8" placeholder="모델명 (예: LG 휘센 FQ18)" value="${esc(f.model)}" oninput="setField('model', this.value)">
        ` : ''}
        ${['냉동창고', '기타 냉동공조'].includes(f.deviceType) ? `
          <div class="row mb8">
            <div>
              <span class="lbl" style="margin-bottom:4px">쿨러 마력 (HP)</span>
              <input placeholder="예: 3" value="${esc(f.coolerHP)}" oninput="setField('coolerHP', this.value)">
            </div>
            <div>
              <span class="lbl" style="margin-bottom:4px">실외기 마력 (HP)</span>
              <input placeholder="예: 5" value="${esc(f.outdoorHP)}" oninput="setField('outdoorHP', this.value)">
            </div>
          </div>
          <div class="mb8">
            <span class="lbl" style="margin-bottom:4px">콤프 마력 (HP)</span>
            <input placeholder="예: 4" value="${esc(f.compHP)}" oninput="setField('compHP', this.value)">

function setField(key, value) {

}

function togglePart(part) {
  if (!formState) return;
  if (formState.parts.includes(part)) {
    formState.parts = formState.parts.filter(p => p !== part);
  } else {
    formState.parts = [...formState.parts, part];
  }
  render();
}

// ── 사진 처리 ─────────────────────────────────────────────
function resizeImage(file, maxWidth = 1200, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handlePhotoUpload(event) {
  const files = Array.from(event.target.files);
  if (!files.length || !formState) return;
  const remaining = 10 - formState.photos.length;
  if (remaining <= 0) { alert('사진은 최대 10장까지 첨부 가능합니다.'); return; }
  const toProcess = files.slice(0, remaining);
  if (files.length > remaining) alert(`최대 10장까지 가능해서 ${remaining}장만 추가됩니다.`);
  try {
    const compressed = await Promise.all(
      toProcess.filter(f => f.type.startsWith('image/')).map(f => resizeImage(f))
    );
    formState.photos = [...formState.photos, ...compressed];
    render();
  } catch (e) {
    alert('사진 처리 중 오류가 발생했습니다: ' + e.message);
  }
  event.target.value = '';
}

function removePhoto(index) {
  if (!formState) return;
  if (!confirm('이 사진을 삭제할까요?')) return;
  formState.photos = formState.photos.filter((_, i) => i !== index);
  render();
}

async function handlePartPhotoUpload(event) {
  const files = Array.from(event.target.files);
  if (!files.length || !formState) return;
  if (!formState.partPhotos) formState.partPhotos = [];
  const remaining = 5 - formState.partPhotos.length;
  if (remaining <= 0) { alert('부품 사진은 최대 5장까지 첨부 가능합니다.'); return; }
  const toProcess = files.slice(0, remaining);
  if (files.length > remaining) alert(`최대 5장까지 가능해서 ${remaining}장만 추가됩니다.`);
  try {
    const compressed = await Promise.all(
      toProcess.filter(f => f.type.startsWith('image/')).map(f => resizeImage(f))
    );
    formState.partPhotos = [...formState.partPhotos, ...compressed];
    render();
  } catch (e) {
    alert('사진 처리 중 오류가 발생했습니다: ' + e.message);
  }
  event.target.value = '';
}

function removePartPhoto(index) {
  if (!formState) return;
  if (!confirm('이 사진을 삭제할까요?')) return;
  formState.partPhotos = formState.partPhotos.filter((_, i) => i !== index);
  render();
}

function viewPhoto(src) {
  const viewer = document.createElement('div');
  viewer.className = 'photo-viewer';
  viewer.innerHTML = `<img src="${src}">`;
  viewer.onclick = () => viewer.remove();
  document.body.appendChild(viewer);
}

function saveForm() {
  const f = formState;
  const logs = getLogs();
  if (editingLogId !== null) {
    saveLogs(logs.map(l => l.id === editingLogId ? { ...f, id: editingLogId, updatedAt: new Date().toISOString() } : l));
  } else {
    saveLogs([{ ...f, id: Date.now(), createdAt: new Date().toISOString() }, ...logs]);
  }
  formState = null;
  editingLogId = null;
  currentTab = 1;
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', i === 1));
  render();
}

function cancelEdit() {
  formState = null;
  editingLogId = null;

}

  const key = $('#api-key-input').value.trim();
  if (!key.startsWith('sk-ant-')) { alert('유효한 Anthropic API 키를 입력하세요 (sk-ant-...)'); return; }
  setApiKey(key);
  render();
}

function resetApiKey() {
  if (!confirm('API 키를 삭제할까요?')) return;
  localStorage.removeItem(API_KEY_STORAGE);
  render();
}

function quickAsk(q) { aiState.q = q; askAI(); }

async function askAI() {
  const qInput = $('#ai-q');
  if (qInput) aiState.q = qInput.value;
  const qText = aiState.q.trim();
  if (!qText) return;
  const logs = getLogs();
  if (!logs.length) { aiState.ans = '수리 기록이 없습니다. 먼저 기록을 등록해주세요!'; render(); return; }
  const apiKey = getApiKey();
  if (!apiKey) { alert('API 키를 먼저 설정하세요'); return; }

  aiState.loading = true; aiState.ans = ''; render();

  const summary = logs.slice(0, 60).map((l, i) =>
    `[${i+1}] 날짜:${l.date} 장비:${l.deviceType} 모델:${l.model||'-'} 위치:${l.location||'-'} 고장유형:${l.faultType||'-'} 증상:${l.symptom} 원인:${l.cause||'-'} 조치:${l.action} 교체부품:${[...(l.parts||[]),l.partsCustom].filter(Boolean).join('/')||'-'} 냉매:${l.refrigerant||'-'} ${l.refAmount||''}kg 고압:${l.highPressure||'-'} 저압:${l.lowPressure||'-'} 시간:${l.workTime||'-'}h 비용:${l.cost||'-'}원 특이사항:${l.specialNote||'-'}`
  ).join('\n');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: `당신은 냉동공조 전문 분석 AI입니다. 아래 실제 수리 기록 데이터를 바탕으로 분석하세요.

수리 기록 (총 ${logs.length}건):
${summary}

규칙:
- 데이터에 있는 내용만 기반으로 답변 (추측 금지)
- 패턴, 통계, 빈도를 구체적으로 분석
- 실무에 도움되는 인사이트 포함
- 한국어, 이모지 적절히 활용, 읽기 쉽게`,
        messages: [{ role: 'user', content: qText }]
      })
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API 오류: ${res.status} - ${err}`);
    }
    const data = await res.json();
    aiState.ans = data.content?.map(c => c.text || '').join('') || '응답을 받지 못했습니다.';
  } catch (e) {
    aiState.ans = `오류: ${e.message}\n\nAPI 키가 올바른지, 인터넷 연결이 정상인지 확인해주세요.`;
  }
  aiState.loading = false;
  render();
}

// ── 통계 ─────────────────────────────────────────────────
function Stats() {
  const logs = getLogs();
  if (!logs.length) return '<div class="empty">📊 기록이 없습니다.</div>';

  const totalCost = logs.reduce((a, l) => a + (Number(l.cost) || 0), 0);
  const totalTime = logs.reduce((a, l) => a + (Number(l.workTime) || 0), 0);
  const totalPhotos = logs.reduce((a, l) => a + (l.photos?.length || 0), 0);
  const storageSize = new Blob([JSON.stringify(_logsCache)]).size;
  const storageMB = (storageSize / 1024 / 1024).toFixed(2);

  const countBy = key => logs.reduce((m, l) => { if (l[key]) m[l[key]] = (m[l[key]] || 0) + 1; return m; }, {});
  const faultCnt = countBy('faultType');
  const devCnt = countBy('deviceType');

  const partFreq = {};
  logs.forEach(l => (l.parts || []).forEach(p => { partFreq[p] = (partFreq[p] || 0) + 1; }));
  const topParts = Object.entries(partFreq).sort((a, b) => b[1] - a[1]).slice(0, 6);

  return `
    <div class="sec">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div class="stat-card"><div class="stat-n">${logs.length}</div><div class="stat-l">총 수리 건수</div></div>
        <div class="stat-card"><div class="stat-n">${totalTime.toFixed(1)}</div><div class="stat-l">총 작업시간(h)</div></div>
      </div>
      <div class="stat-card" style="margin-bottom:10px">
        <div class="stat-n" style="font-size:22px">${totalCost.toLocaleString()}원</div>
        <div class="stat-l">총 비용 합계</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div class="stat-card"><div class="stat-n" style="font-size:18px">📷 ${totalPhotos}장</div><div class="stat-l">첨부된 사진</div></div>
        <div class="stat-card"><div class="stat-n" style="font-size:18px">💾 ${storageMB}MB</div><div class="stat-l">저장 공간 사용</div></div>
      </div>

      ${Object.keys(faultCnt).length > 0 ? `
        <div class="card">
          <span class="lbl">⚠️ 고장 유형 통계</span>
          ${Object.entries(faultCnt).sort((a, b) => b[1] - a[1]).map(([t, n]) => `
            <div>
              <div class="sb"><span style="font-size:12px">${esc(t)}</span><span style="font-size:12px;color:var(--accent);font-weight:700">${n}건</span></div>
              <div class="bar-bg"><div class="bar-fg" style="width:${(n/logs.length)*100}%"></div></div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${topParts.length > 0 ? `
        <div class="card">
          <span class="lbl">🔩 교체 부품 빈도 TOP</span>
          ${topParts.map(([p, n]) => `
            <div>
              <div class="sb"><span style="font-size:12px">${esc(p)}</span><span style="font-size:12px;color:var(--warning);font-weight:700">${n}회</span></div>
              <div class="bar-bg"><div class="bar-fg warn" style="width:${(n/topParts[0][1])*100}%"></div></div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="card">
        <span class="lbl">🔧 장비 유형 분포</span>
        ${Object.entries(devCnt).sort((a, b) => b[1] - a[1]).map(([t, n]) => `
          <div class="sb" style="padding:7px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:12px">${esc(t)}</span>
            <span class="tag accent2">${n}건</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── AI 수리 도우미 💬 ─────────────────────────────────────
let chatState = {
  messages: [],
  mode: 'free', // free, diagnose, guide
  pendingPhotos: [],
  isLoading: false,
};

function loadChatHistory() {
  try {
    const saved = JSON.parse(localStorage.getItem(CHAT_STORAGE) || '[]');
    chatState.messages = saved.slice(-30); // 최근 30개만 유지
  } catch { chatState.messages = []; }
}

function saveChatHistory() {
  try {
    localStorage.setItem(CHAT_STORAGE, JSON.stringify(chatState.messages.slice(-30)));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      chatState.messages = chatState.messages.slice(-10);
      try { localStorage.setItem(CHAT_STORAGE, JSON.stringify(chatState.messages)); } catch {}
    }
  }
}

function renderMessage(msg) {
  if (msg.type === 'system') {
    return `<div class="msg system">${esc(msg.text)}</div>`;
  }
  const time = new Date(msg.time).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  if (msg.type === 'user') {
    return `
      <div class="msg user">
        ${esc(msg.text)}
        ${msg.photos && msg.photos.length ? msg.photos.map(p => `<img src="${p}" class="msg-photo" onclick="viewPhoto('${p}')">`).join('') : ''}
        <div class="msg-time">${time}</div>
      </div>
    `;
  }
  // AI 메시지
  let content = esc(msg.text);
  // 과거 사례 박스 렌더링
  if (msg.cases && msg.cases.length) {
    content += msg.cases.map(c => `
      <div class="msg-cases">
        <strong>📁 ${c.date} - ${c.device}</strong><br>
        ${esc(c.summary)}
      </div>
    `).join('');
  }
  // 저장 제안 카드
  if (msg.saveRecord) {
    content += renderSaveRecordCard(msg.saveRecord, msg.id);
  }
  return `
    <div class="msg ai">
      ${content}
      <div class="msg-time">${time}</div>
    </div>
  `;
}

function getChatPlaceholder() {
  const ph = {
    free: '무엇이든 물어보세요...',
    diagnose: '증상을 설명해주세요...',
    guide: '어떤 작업 도움이 필요하세요?',

function initChatUI() {
  setTimeout(() => {
    const container = $('#chat-messages');
    if (container) container.scrollTop = container.scrollHeight;
  }, 50);
}

function setChatMode(mode) {
  chatState.mode = mode;
  render();
}

function clearChat() {
  if (!confirm('대화 내용을 모두 삭제할까요?')) return;
  chatState.messages = [];
  chatState.pendingPhotos = [];
  saveChatHistory();
  render();
}

function useQuickQ(q) {
  const input = $('#chat-input');
  if (input) { input.value = q; sendMessage(); }
}

async function handleChatPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (chatState.pendingPhotos.length >= 3) { alert('한 번에 최대 3장까지 첨부 가능합니다.'); return; }
  try {
    const compressed = await resizeImage(file, 1024, 0.7);
    chatState.pendingPhotos.push(compressed);
    render();
  } catch (e) { alert('사진 처리 오류: ' + e.message); }
  event.target.value = '';
}

function removePendingPhoto(i) {
  chatState.pendingPhotos.splice(i, 1);
  render();
}

function handleChatKeydown(e) {
  // Enter = 전송, Shift+Enter = 줄바꿈
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// 메시지 전송 & AI 응답 처리
async function sendMessage() {
  const input = $('#chat-input');
  const text = (input?.value || '').trim();
  const photos = [...chatState.pendingPhotos];
  if (!text && photos.length === 0) return;

  // 사용자 메시지 추가
  chatState.messages.push({
    id: 'u' + Date.now(),
    type: 'user',
    text: text || '(사진 첨부)',
    photos: photos,
    time: Date.now(),
  });
  chatState.pendingPhotos = [];
  chatState.isLoading = true;
  saveChatHistory();
  render();

  // AI 응답 받기
  try {
    const response = await callAIAssistant(text, photos);
    chatState.messages.push({
      id: 'a' + Date.now(),
      type: 'ai',
      text: response.text,
      cases: response.cases || [],
      saveRecord: response.saveRecord || null,
      time: Date.now(),
    });
  } catch (e) {
    chatState.messages.push({
      id: 'a' + Date.now(),
      type: 'ai',
      text: `⚠️ 오류가 발생했어요: ${e.message}\n\nAPI 키 확인 또는 잠시 후 다시 시도해주세요.`,
      time: Date.now(),
    });
  }
  chatState.isLoading = false;
  saveChatHistory();
  render();
}

3. 모르는 건 모른다고 솔직히
4. 위험한 작업은 안전 주의사항 강조
5. 이모지는 필요할 때만 (과하지 않게)
6. 마크다운 헤더(#) 사용 금지, 대신 이모지로 섹션 구분

【특수 응답 포맷】
수리 대화가 마무리되는 느낌이 들면 (작업 완료, 해결됨 등의 표현), 답변 마지막에 다음 JSON을 정확히 포함하세요:

<SAVE_RECORD>
{"deviceType":"...","model":"...","faultType":"...","symptom":"...","cause":"...","action":"...","parts":["..."],"refrigerant":"...","refAmount":"...","workTime":"...","cost":"","memo":""}
</SAVE_RECORD>

값을 모르는 필드는 빈 문자열. parts는 배열. 이 태그는 기록 저장 제안 카드로 변환됩니다.

과거 유사 사례를 참조할 때 답변 중간에 다음 포맷 사용 가능:
<CASE date="2025-10-15" device="에어컨(상업용)">드레인 호스 각도 불량, 재설치로 해결</CASE>`;

  // 최근 대화 히스토리 (최근 10개)
  const recentMessages = chatState.messages.slice(-10).filter(m => m.type !== 'system').map(m => {
    if (m.type === 'user') {
      const content = [{ type: 'text', text: m.text }];
      if (m.photos && m.photos.length) {
        m.photos.forEach(p => {
          const match = p.match(/^data:(image\/\w+);base64,(.+)$/);
          if (match) {
            content.unshift({
              type: 'image',
              source: { type: 'base64', media_type: match[1], data: match[2] }
            });
          }
        });
      }
      return { role: 'user', content };
    }
    return { role: 'assistant', content: m.text };
  });

  // 현재 메시지
  const currentContent = [];
  userPhotos.forEach(p => {
    const match = p.match(/^data:(image\/\w+);base64,(.+)$/);
    if (match) {
      currentContent.push({
        type: 'image',
        source: { type: 'base64', media_type: match[1], data: match[2] }
      });
    }
  });
  if (userText) currentContent.push({ type: 'text', text: userText });
  if (currentContent.length === 0) currentContent.push({ type: 'text', text: '(이미지 분석 부탁드려요)' });

  // 마지막 메시지는 currentContent로 교체
  const messages = recentMessages.slice(0, -1);
  messages.push({ role: 'user', content: currentContent });

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1500,
      system: systemPrompt,
      messages: messages,
    }),
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API ${res.status}: ${err.slice(0, 100)}`);
  }

  const data = await res.json();
  let fullText = data.content?.map(c => c.text || '').join('') || '';

  // SAVE_RECORD 태그 파싱
  let saveRecord = null;
  const saveMatch = fullText.match(/<SAVE_RECORD>\s*([\s\S]*?)\s*<\/SAVE_RECORD>/);
  if (saveMatch) {
    try {
      saveRecord = JSON.parse(saveMatch[1]);
      fullText = fullText.replace(/<SAVE_RECORD>[\s\S]*?<\/SAVE_RECORD>/, '').trim();
    } catch (e) { console.error('SAVE_RECORD 파싱 실패', e); }
  }

  // CASE 태그 파싱
  const cases = [];
  const caseRegex = /<CASE\s+date="([^"]*)"\s+device="([^"]*)">([^<]+)<\/CASE>/g;
  let m;
  while ((m = caseRegex.exec(fullText)) !== null) {
    cases.push({ date: m[1], device: m[2], summary: m[3] });
  }
  fullText = fullText.replace(/<CASE[^>]*>[^<]*<\/CASE>/g, '').trim();

  return { text: fullText, cases, saveRecord };
}

// 대화에서 나온 기록을 바로 저장
function saveFromChat(msgId) {
  const msg = chatState.messages.find(m => m.id === msgId);
  if (!msg || !msg.saveRecord) return;
  const r = msg.saveRecord;
  if (!r.deviceType || !r.symptom || !r.action) {
    alert('장비, 증상, 조치 내용이 필요해요. "수정 후 저장"으로 보완해주세요!');
    return;
  }
  // 저장 데이터 구성
  const newLog = {
    id: Date.now(),
    createdAt: new Date().toISOString(),
    date: new Date().toISOString().slice(0, 10),
    deviceType: r.deviceType || '',
    model: r.model || '',
    location: r.location || '',
    faultType: r.faultType || '',
    symptom: r.symptom || '',
    cause: r.cause || '',
    action: r.action || '',
    parts: r.parts || [],
    partsCustom: '',
    refrigerant: r.refrigerant || '',
    refAmount: r.refAmount || '',
    highPressure: r.highPressure || '',
    lowPressure: r.lowPressure || '',
    workTime: r.workTime || '',
    cost: r.cost || '',
    specialNote: r.specialNote || '',
    memo: r.memo || '(AI 대화에서 자동 기록)',
    photos: [],
  };
  try {
    const logs = getLogs();
    saveLogs([newLog, ...logs]);
    // 시스템 메시지 추가
    chatState.messages.push({
      id: 's' + Date.now(),
      type: 'system',
      text: '✅ 기록이 저장되었습니다!',
      time: Date.now(),
    });
    saveChatHistory();
    render();
  } catch (e) {
    alert('저장 실패: ' + e.message);
  }
}

// 대화 내용으로 기록 폼에 채워서 이동
function editAndGoToForm(msgId) {
  const msg = chatState.messages.find(m => m.id === msgId);
  if (!msg || !msg.saveRecord) return;
  const r = msg.saveRecord;
  formState = {
    date: new Date().toISOString().slice(0, 10),
    deviceType: r.deviceType || '',
    model: r.model || '',
    location: r.location || '',
    faultType: r.faultType || '',
    symptom: r.symptom || '',
    cause: r.cause || '',
    action: r.action || '',
    parts: r.parts || [],
    partsCustom: '',
    refrigerant: r.refrigerant || '',
    refAmount: r.refAmount || '',
    highPressure: r.highPressure || '',
    lowPressure: r.lowPressure || '',
    workTime: r.workTime || '',
    cost: r.cost || '',
    specialNote: r.specialNote || '',
    memo: r.memo || '(AI 대화에서 생성)',
    photos: [],
  };
  currentTab = 0;
  document.querySelectorAll('.tab').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });

}

// ── 렌더링 ────────────────────────────────────────────────
function render() {
  const views = { 0: LogForm, 1: LogList, 2: AIAssistant, 3: AIAnalysis, 4: Stats };
  $('#app').innerHTML = views[currentTab]();
  if (currentTab === 2) initChatUI();
}

// ── PWA 설치 안내 ────────────────────────────────────────
function showInstallGuide() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isStandalone) return; // 이미 설치됨
  const shown = localStorage.getItem('install-guide-shown');
  if (shown) return;

  const banner = $('#install-banner');
  const text = $('#install-text');
  if (isIOS) {
    text.innerHTML = 'Safari 하단 <strong>공유 버튼 📤</strong> → <strong>"홈 화면에 추가"</strong>로 앱처럼 사용하세요!';
    banner.style.display = 'block';
  } else if (isAndroid) {
    text.innerHTML = 'Chrome 메뉴(⋮) → <strong>"홈 화면에 추가"</strong> 또는 <strong>"앱 설치"</strong>로 설치하세요!';
    banner.style.display = 'block';
  }
  setTimeout(() => { localStorage.setItem('install-guide-shown', '1'); }, 5000);
}
